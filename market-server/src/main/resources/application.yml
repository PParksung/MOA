spring:
  application:
    name: market-server

  datasource:
    url: jdbc:mysql://localhost:3306/moa_security?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8083

kis:
  app-key: ${KIS_APP_KEY}
  app-secret: ${KIS_APP_SECRET}
