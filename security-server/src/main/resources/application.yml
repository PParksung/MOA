spring:
  application:
    name: security-server

  datasource:
    url: jdbc:mysql://localhost:3306/moa_security?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 300000      # 5분 (ms)
  refresh-expiration: 604800000  # 7일 (ms)

aes:
  key: ${AES_KEY}
  iv: ${AES_IV}

exchange:
  server-url: ${EXCHANGE_SERVER_URL:http://localhost:8081}
